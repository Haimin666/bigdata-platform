server:
  port: 8088

spring:
  application:
    name: platform-service
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/platform?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false
    show-sql: false

platform:
  jwt:
    secret: ${JWT_SECRET:change-me-this-is-a-dev-secret-key-at-least-256-bits-long-please}
    ttl-minutes: ${JWT_TTL_MINUTES:720}
  # Linkis 网关地址（内置网关把 /api/linkis/** 转发到这里）
  linkis:
    base-url: ${LINKIS_BASE_URL:http://linkis:9001}
    mock: ${LINKIS_MOCK:false}
  # OpenMetadata（数据血缘，P2）。直连现有实例，token 走环境变量；留空则血缘接口返回 503
  openmetadata:
    base-url: ${OPENMETADATA_BASE_URL:}
    token: ${OPENMETADATA_TOKEN:}
  # DolphinScheduler（离线调度，P3）。直连现有实例；API token 走环境变量，留空则调度接口返回 503
  dolphinscheduler:
    base-url: ${DOLPHINSCHEDULER_BASE_URL:}
    token: ${DOLPHINSCHEDULER_TOKEN:}
  # StreamPark（实时开发，P5）。直连现有实例；API token 走环境变量，留空则实时接口返回 503
  # P5 仅接入只读端点（dashboard/project/env/cluster/team），不触发 build/deploy/start/cancel
  streampark:
    base-url: ${STREAMPARK_BASE_URL:}
    token: ${STREAMPARK_TOKEN:}
    team-id: ${STREAMPARK_TEAM_ID:}
  cors:
    origins: ${CORS_ORIGINS:http://localhost:3000}

logging:
  level:
    com.dataplatform: INFO
    org.springframework.security: INFO
